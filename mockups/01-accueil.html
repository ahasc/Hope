<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hope — Accueil</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #04040f;
  font-family: 'Crimson Text', serif;
  color: #d8d0c0;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Fond — rayons de lumière */
.bg-rays {
  position: fixed;
  inset: 0;
  background:
    conic-gradient(from 180deg at 50% 110%,
      transparent 0deg,
      rgba(20,50,140,0.07) 15deg,
      transparent 30deg,
      rgba(20,50,140,0.05) 45deg,
      transparent 60deg,
      rgba(20,50,140,0.07) 75deg,
      transparent 90deg,
      rgba(20,50,140,0.04) 110deg,
      transparent 130deg,
      rgba(20,50,140,0.06) 145deg,
      transparent 160deg
    );
  animation: rays-rotate 20s linear infinite;
}

@keyframes rays-rotate {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.bg-vignette {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, transparent 20%, rgba(4,4,15,0.7) 70%, #04040f 100%),
    radial-gradient(ellipse 120% 80% at 50% 20%, rgba(10,20,60,0.5) 0%, transparent 60%);
  pointer-events: none;
}

/* Particules */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

.p {
  position: absolute;
  border-radius: 50%;
  background: rgba(200,164,74,0.6);
  animation: float-up linear infinite;
}

@keyframes float-up {
  from { transform: translateY(0) scale(1); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.3; }
  to   { transform: translateY(-100vh) scale(0); opacity: 0; }
}

/* Diamant principal */
.diamond-wrap {
  position: relative;
  margin-bottom: 48px;
  z-index: 10;
}

.diamond-outer-glow {
  position: absolute;
  width: 220px; height: 220px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(ellipse, rgba(48,112,208,0.35) 0%, transparent 70%);
  animation: glow-pulse 4s ease-in-out infinite;
  border-radius: 50%;
}

@keyframes glow-pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
  50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
}

.diamond-shape {
  width: 120px; height: 120px;
  position: relative;
  z-index: 2;
}

.diamond-shape svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 20px rgba(48,112,208,0.9)) drop-shadow(0 0 60px rgba(20,60,200,0.5));
  animation: diamond-spin 60s linear infinite;
}

@keyframes diamond-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.diamond-inner-flicker {
  position: absolute;
  width: 30px; height: 30px;
  background: radial-gradient(ellipse, rgba(160,200,255,0.9) 0%, rgba(100,160,255,0.5) 40%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  animation: flicker 2s ease-in-out infinite;
  z-index: 3;
}

@keyframes flicker {
  0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
  33% { opacity: 1; transform: translate(-50%, -50%) scale(1.4); }
  66% { opacity: 0.7; transform: translate(-50%, -50%) scale(0.8); }
}

/* Titre */
.content {
  text-align: center;
  z-index: 10;
  position: relative;
}

.pre-title {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.6em;
  color: #5a5040;
  margin-bottom: 12px;
  text-transform: uppercase;
}

h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(52px, 8vw, 96px);
  font-weight: 900;
  letter-spacing: 0.18em;
  line-height: 1;
  background: linear-gradient(180deg, #f0d070 0%, #c8a44a 40%, #8b6914 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 30px rgba(200,164,74,0.4));
}

.tagline {
  font-family: 'Crimson Text', serif;
  font-size: 20px;
  font-style: italic;
  color: #7a7060;
  margin: 20px 0 0;
  letter-spacing: 0.05em;
}

/* Séparateur */
.ornament {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 40px 0;
  justify-content: center;
}

.ornament-line {
  width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(200,164,74,0.5));
}

.ornament-line:last-child {
  background: linear-gradient(90deg, rgba(200,164,74,0.5), transparent);
}

.ornament-dot {
  width: 6px; height: 6px;
  background: rgba(200,164,74,0.6);
  transform: rotate(45deg);
}

/* Bouton */
.btn-start {
  display: inline-block;
  padding: 18px 56px;
  border: 1px solid rgba(200,164,74,0.5);
  font-family: 'Cinzel', serif;
  font-size: 14px;
  letter-spacing: 0.3em;
  color: #c8a44a;
  background: linear-gradient(180deg, rgba(200,164,74,0.08) 0%, rgba(200,164,74,0.03) 100%);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
  text-transform: uppercase;
}

.btn-start::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(200,164,74,0.15) 0%, rgba(200,164,74,0.05) 100%);
  opacity: 0;
  transition: opacity 0.4s ease;
}

.btn-start:hover::before { opacity: 1; }
.btn-start:hover {
  border-color: rgba(200,164,74,0.8);
  color: #f0d070;
  box-shadow: 0 0 30px rgba(200,164,74,0.2), inset 0 0 20px rgba(200,164,74,0.05);
}

.btn-subtitle {
  display: block;
  font-family: 'Crimson Text', serif;
  font-size: 13px;
  color: #5a5040;
  font-style: italic;
  letter-spacing: 0.05em;
  margin-top: 4px;
  text-transform: none;
}

/* Bas de page */
.footer-info {
  position: fixed;
  bottom: 32px;
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 60px;
  z-index: 10;
}

.info-item {
  text-align: center;
}

.info-value {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  color: #c8a44a;
  font-weight: 600;
}

.info-label {
  font-size: 12px;
  letter-spacing: 0.2em;
  color: #5a5040;
  text-transform: uppercase;
  display: block;
  margin-top: 2px;
}

.info-sep {
  width: 1px;
  background: rgba(200,164,74,0.15);
  align-self: stretch;
}

/* Nav */
.nav-hint {
  position: fixed;
  top: 24px;
  right: 32px;
  font-size: 12px;
  color: #3a3030;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.15em;
}

.nav-hint a { color: #5a5040; text-decoration: none; }
.nav-hint a:hover { color: #c8a44a; }
</style>
  </head>
  <body>

    <div class="bg-rays"></div>
    <div class="bg-vignette"></div>

    <!-- Particules flottantes -->
    <div class="particles">
      <div class="p"
        style="left:15%;width:2px;height:2px;animation-duration:8s;animation-delay:0s;"></div>
      <div class="p"
        style="left:28%;width:1px;height:1px;animation-duration:12s;animation-delay:2s;"></div>
      <div class="p"
        style="left:45%;width:3px;height:3px;animation-duration:10s;animation-delay:5s;"></div>
      <div class="p"
        style="left:62%;width:2px;height:2px;animation-duration:9s;animation-delay:1s;"></div>
      <div class="p"
        style="left:78%;width:1px;height:1px;animation-duration:14s;animation-delay:7s;"></div>
      <div class="p"
        style="left:88%;width:2px;height:2px;animation-duration:11s;animation-delay:3s;"></div>
      <div class="p"
        style="left:5%;width:1px;height:1px;animation-duration:16s;animation-delay:9s;"></div>
      <div class="p"
        style="left:55%;width:2px;height:2px;animation-duration:7s;animation-delay:4s;background:rgba(100,150,255,0.6);"></div>
      <div class="p"
        style="left:72%;width:1px;height:1px;animation-duration:13s;animation-delay:6s;background:rgba(100,150,255,0.4);"></div>
    </div>

    <div class="diamond-wrap">
      <div class="diamond-outer-glow"></div>
      <div class="diamond-shape">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <lineargradient id="dg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#0a2060" />
              <stop offset="25%" stop-color="#1a4a9a" />
              <stop offset="50%" stop-color="#4080e0" />
              <stop offset="65%" stop-color="#6090f0" />
              <stop offset="80%" stop-color="#2050a0" />
              <stop offset="100%" stop-color="#0a1840" />
            </lineargradient>
            <lineargradient id="dg2" x1="100%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="rgba(180,220,255,0.5)" />
              <stop offset="50%" stop-color="rgba(100,160,255,0.2)" />
              <stop offset="100%" stop-color="rgba(20,60,180,0.1)" />
            </lineargradient>
          </defs>
          <!-- Corps du diamant -->
          <polygon points="50,5 95,38 75,95 25,95 5,38" fill="url(#dg)" />
          <!-- Facettes -->
          <polygon points="50,5 95,38 50,40" fill="rgba(120,180,255,0.25)" />
          <polygon points="5,38 50,40 25,95" fill="rgba(20,60,160,0.3)" />
          <polygon points="95,38 75,95 50,40" fill="rgba(10,30,100,0.4)" />
          <polygon points="50,40 25,95 75,95" fill="rgba(30,70,180,0.2)" />
          <!-- Éclat central -->
          <polygon points="50,5 95,38 50,40" fill="url(#dg2)" opacity="0.6" />
          <!-- Contours -->
          <polygon points="50,5 95,38 75,95 25,95 5,38" fill="none"
            stroke="rgba(100,160,255,0.4)" stroke-width="0.5" />
          <line x1="50" y1="5" x2="50" y2="40" stroke="rgba(150,200,255,0.3)"
            stroke-width="0.5" />
          <line x1="5" y1="38" x2="95" y2="38" stroke="rgba(150,200,255,0.2)"
            stroke-width="0.5" />
        </svg>
      </div>
      <div class="diamond-inner-flicker"></div>
    </div>

    <div class="content">
      <p class="pre-title">Le Diamand Hope</p>
      <h1>Hope</h1>
      <p
        class="tagline">"Il a traversé les siècles. Il ne vous laissera pas passer."</p>

      <div class="ornament">
        <div class="ornament-line"></div>
        <div class="ornament-dot"></div>
        <div class="ornament-dot"
          style="opacity:0.5;transform:rotate(45deg) scale(0.6)"></div>
        <div class="ornament-dot"></div>
        <div class="ornament-line"></div>
      </div>

      <a href="02-setup-joueurs.html" class="btn-start">
        Commencer la partie
        <span class="btn-subtitle">3 à 6 joueurs · 45 à 75 min</span>
      </a>
    </div>

    <div class="footer-info">
      <div class="info-item">
        <div class="info-value">3–6</div>
        <span class="info-label">Joueurs</span>
      </div>
      <div class="info-sep"></div>
      <div class="info-item">
        <div class="info-value">45'</div>
        <span class="info-label">Durée</span>
      </div>
      <div class="info-sep"></div>
      <div class="info-item">
        <div class="info-value">12+</div>
        <span class="info-label">Âge</span>
      </div>
      <div class="info-sep"></div>
      <div class="info-item">
        <div class="info-value">8</div>
        <span class="info-label">Tours</span>
      </div>
    </div>

    <div class="nav-hint">
      <a href="index.html">← Index</a>
    </div>

  </body>
</html>
